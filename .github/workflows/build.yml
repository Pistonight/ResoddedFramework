
name: Build

on:
  push:
    branches: [dev, main]
  pull_request:
      branches: [dev, main]

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  VCPKG_FEATURE_FLAGS: dependencygraph
  VCPKG_ROOT: ${{ env.VCPKG_INSTALLATION_ROOT }}

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        preset: [windows-x64-release-msvc, windows-x86-release-msvc]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: '3.28'

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_INSTALLATION_ROOT }}\installed
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: out/build/msvc/${{ matrix.preset }}
          key: ${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.preset }}-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }} -DGITHUB_ACTIONS=ON

      - name: Build
        run: cmake --build --preset ${{ matrix.build_preset }}

      - name: Install
        run: cmake --install out/build/msvc/${{ matrix.preset }}

      - name: Package Export folder
        run: |
          mkdir packaged
          powershell Compress-Archive -Path "Export/*" -DestinationPath "packaged/Export-${{ matrix.preset }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Export-${{ matrix.preset }}
          path: packaged/Export-${{ matrix.preset }}.zip
