# I'm old!
name: Build

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        config: [windows-x64-debug-msvc, windows-x64-release-msvc, windows-x86-debug-msvc, windows-x86-release-msvc]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: '3.28'

      - name: Create build directory
        run: mkdir build

      - name: Configure CMake
        run: cmake -S . -B build -A Win32 -DCMAKE_BUILD_TYPE=${{ matrix.config }} -DGITHUB_ACTIONS=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.config }}

      # ok.. installing
      - name: Install
        run: cmake --install build --config ${{ matrix.config }}

      - name: Package Export folder
        run: |
          mkdir packaged
          powershell Compress-Archive -Path "Export/*" -DestinationPath "packaged/Export-${{ matrix.config }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Export-${{ matrix.config }}
          path: packaged/Export-${{ matrix.config }}.zip
